# tests use the simulator so they can't run in parallel
# see https://gitlab.com/gitlab-org/gitlab/issues/15536 for future support of locks
stages:
  - int-test

.common:
  stage: int-test
  resource_group: "ios-simulator"
  tags: [mac, x64, xcode]

spm:
  extends: .common
  script:
    # IntTestiOSEmpty seemed fine with Xcode 16.0, but failed on 15.4 with:
    # > public headers ("include") directory path for 'IntTestiOSEmpty' is invalid or not contained in the target
    - ./test.sh --spm --skip IntTestiOSEmpty

latest:
  extends: .common
  script:
    - ./test.sh
    - ./test.sh --clean -v 4.0.1
    - ./test.sh --clean -v 4.0.1-sync

2nd-latest:
  extends: .common
  script:
    - ./test.sh
    - ./test.sh --clean -v 4.0.0
    - ./test.sh --clean -v 4.0.0-sync

# Only works if runner has matching Swift version
# Disabled: currently, the carthage package was build with an older Swift version...
.latest-carthage:
  extends: .common
  script:
    - ./test.sh --carthage-bin
    - ./test.sh --clean --carthage-bin -v 4.0.1

# If there's a staging release... (otherwise, disabled via leading '.')
.carthage-staging:
  extends: .common
  script:
    - ./test.sh --staging --carthage -v 1.9.1-rc1
